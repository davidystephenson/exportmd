name: Vercel main deploy

on:
  push:
    branches:
      - main

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Trigger Vercel production deploy
        env:
          VERCEL_MAIN_DEPLOY_HOOK: ${{ secrets.VERCEL_MAIN_DEPLOY_HOOK }}
        run: |
          test -n "$VERCEL_MAIN_DEPLOY_HOOK"
          curl --fail --show-error --silent --request POST "$VERCEL_MAIN_DEPLOY_HOOK"
